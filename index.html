<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Zettelwirtschaft 🛒</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600&family=DM+Serif+Display:ital@0;1&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0f0f13;
    --surface: #1a1a22;
    --surface2: #22222e;
    --border: rgba(255,255,255,0.08);
    --border2: rgba(255,255,255,0.14);
    --text: #f0f0f5;
    --text2: #9898aa;
    --text3: #55556a;
    --blue: #4f8ef7;
    --blue-soft: rgba(79,142,247,0.18);
    --violet: #a374f7;
    --violet-soft: rgba(163,116,247,0.18);
    --radius: 18px;
    --radius-sm: 12px;
    --safe-bottom: env(safe-area-inset-bottom, 0px);
  }
  * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
  html, body { height: 100%; }
  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'DM Sans', sans-serif;
    min-height: 100vh;
    padding-bottom: calc(2rem + var(--safe-bottom));
    overscroll-behavior: none;
  }

  /* ── IDENTITY SCREEN ── */
  #identityScreen {
    position: fixed; inset: 0; z-index: 100;
    background: var(--bg);
    display: flex; align-items: center; justify-content: center;
    padding: 2rem;
  }
  .identity-card {
    background: var(--surface);
    border: 1px solid var(--border2);
    border-radius: 24px;
    padding: 2.5rem 1.75rem;
    max-width: 340px; width: 100%;
    text-align: center;
  }
  .identity-card .big-emoji { font-size: 3.5rem; margin-bottom: 1rem; }
  .identity-card h2 { font-family: 'DM Serif Display', serif; font-size: 1.7rem; margin-bottom: 0.5rem; }
  .identity-card p { color: var(--text2); font-size: 0.9rem; margin-bottom: 2rem; line-height: 1.5; }
  .identity-btns { display: flex; flex-direction: column; gap: 0.75rem; }
  .id-btn {
    padding: 1rem 1.5rem;
    border-radius: var(--radius-sm);
    border: 1.5px solid var(--border2);
    background: var(--surface2);
    color: var(--text);
    font-family: 'DM Sans', sans-serif;
    font-size: 1.05rem; font-weight: 500;
    cursor: pointer; transition: all 0.2s;
    display: flex; align-items: center; gap: 0.75rem;
  }
  .id-btn.blue  { border-color: var(--blue);   background: var(--blue-soft);   color: var(--blue); }
  .id-btn.violet{ border-color: var(--violet); background: var(--violet-soft); color: var(--violet); }
  .id-btn .dot  { width: 10px; height: 10px; border-radius: 50%; flex-shrink: 0; }
  .id-btn.blue   .dot { background: var(--blue); }
  .id-btn.violet .dot { background: var(--violet); }

  /* ── HEADER ── */
  .app-header {
    padding: calc(env(safe-area-inset-top, 12px) + 1rem) 1.25rem 0.75rem;
    display: flex; align-items: center; justify-content: space-between;
    position: sticky; top: 0; z-index: 10;
    background: linear-gradient(to bottom, var(--bg) 75%, transparent);
  }
  .app-title { font-family: 'DM Serif Display', serif; font-size: 1.75rem; }
  .user-chip {
    display: flex; align-items: center; gap: 0.45rem;
    padding: 0.45rem 1rem;
    border-radius: 99px;
    border: 1px solid var(--border2);
    background: var(--surface);
    font-size: 0.9rem; font-weight: 500;
    cursor: pointer; user-select: none;
  }
  .user-chip .dot { width: 8px; height: 8px; border-radius: 50%; }

  /* ── SYNC BAR ── */
  .sync-bar {
    margin: 0 1.25rem 1rem;
    padding: 0.55rem 1rem;
    border-radius: var(--radius-sm);
    background: var(--surface);
    border: 1px solid var(--border);
    font-size: 0.8rem; color: var(--text2);
    display: flex; align-items: center; gap: 0.5rem;
  }
  .sync-dot { width: 7px; height: 7px; border-radius: 50%; background: #4ade80; flex-shrink: 0; }
  .sync-dot.error   { background: #f87171; }
  .sync-dot.loading { background: #fbbf24; animation: blink 1s infinite; }
  @keyframes blink { 0%,100%{opacity:1} 50%{opacity:0.2} }

  /* ── ADD LIST BTN ── */
  .add-list-btn {
    margin: 0 1.25rem 1.5rem;
    width: calc(100% - 2.5rem);
    padding: 1rem;
    border-radius: var(--radius-sm);
    border: 1.5px dashed var(--border2);
    background: transparent;
    color: var(--text2);
    font-family: 'DM Sans', sans-serif;
    font-size: 1rem; font-weight: 500;
    cursor: pointer; transition: all 0.2s;
    display: flex; align-items: center; justify-content: center; gap: 0.5rem;
  }
  .add-list-btn:active { background: var(--surface); }

  /* ── LISTS GRID ── */
  .lists-container {
    padding: 0 1.25rem;
    display: grid;
    grid-template-columns: repeat(2, 1fr);
    gap: 1rem;
  }

  /* ── LIST TILE (overview) ── */
  .list-tile {
    border-radius: var(--radius);
    border: 1px solid var(--border);
    overflow: hidden;
    cursor: pointer;
    transition: transform 0.15s, box-shadow 0.15s;
    min-height: 120px;
    display: flex; flex-direction: column; justify-content: flex-end;
    position: relative;
    background-size: cover; background-position: center;
  }
  .list-tile:active { transform: scale(0.97); }
  .list-tile-inner {
    padding: 0.85rem 1rem;
    background: linear-gradient(to top, rgba(0,0,0,0.72) 60%, transparent);
    display: flex; align-items: flex-end; justify-content: space-between;
  }
  .list-tile-left { display: flex; flex-direction: column; gap: 0.2rem; }
  .list-tile-emoji { font-size: 1.8rem; line-height: 1; }
  .list-tile-name  { font-size: 0.95rem; font-weight: 600; color: #fff; text-shadow: 0 1px 4px rgba(0,0,0,0.5); }
  .list-tile-count { font-size: 0.75rem; color: rgba(255,255,255,0.6); }
  .list-tile-edit  {
    background: rgba(255,255,255,0.15); border: none; border-radius: 8px;
    color: #fff; cursor: pointer; padding: 0.3rem 0.5rem; font-size: 1rem;
    backdrop-filter: blur(4px); flex-shrink: 0; align-self: flex-start;
    margin-top: auto;
  }

  /* ── DETAIL VIEW ── */
  #detailView {
    position: fixed; inset: 0; z-index: 20;
    background: var(--bg);
    display: flex; flex-direction: column;
    transform: translateX(100%);
    transition: transform 0.3s cubic-bezier(0.4,0,0.2,1);
  }
  #detailView.open { transform: translateX(0); }

  .detail-header {
    padding: calc(env(safe-area-inset-top, 12px) + 0.75rem) 1.25rem 0.75rem;
    display: flex; align-items: center; gap: 0.75rem;
    background-size: cover; background-position: center;
    position: relative; flex-shrink: 0;
    min-height: 120px;
  }
  .detail-header-bg {
    position: absolute; inset: 0;
    background: linear-gradient(to bottom, rgba(0,0,0,0.35), rgba(0,0,0,0.7));
  }
  .detail-header > * { position: relative; z-index: 1; }
  .back-btn {
    background: rgba(255,255,255,0.15); border: none;
    border-radius: 10px; color: #fff; cursor: pointer;
    padding: 0.5rem 0.75rem; font-size: 1rem;
    backdrop-filter: blur(4px); flex-shrink: 0;
  }
  .detail-title-wrap { flex: 1; }
  .detail-emoji { font-size: 2rem; line-height: 1; }
  .detail-name  { font-family: 'DM Serif Display', serif; font-size: 1.4rem; color: #fff; }
  .detail-edit-btn {
    background: rgba(255,255,255,0.15); border: none;
    border-radius: 10px; color: #fff; cursor: pointer;
    padding: 0.5rem 0.75rem; font-size: 1rem;
    backdrop-filter: blur(4px); flex-shrink: 0;
  }

  .detail-body { flex: 1; overflow-y: auto; padding: 0.5rem 0; }

  /* ── ITEMS ── */
  .item-row {
    display: flex; align-items: center; gap: 0.75rem;
    padding: 0.75rem 1.25rem;
    border-bottom: 1px solid rgba(255,255,255,0.05);
    animation: fadeIn 0.18s ease;
  }
  @keyframes fadeIn { from{opacity:0;transform:translateY(-4px)} to{opacity:1;transform:translateY(0)} }
  .item-check {
    width: 22px; height: 22px; border-radius: 7px;
    border: 1.5px solid rgba(255,255,255,0.2);
    background: transparent; cursor: pointer; flex-shrink: 0;
    display: flex; align-items: center; justify-content: center;
    transition: all 0.15s;
  }
  .item-check.checked { background: #4ade80; border-color: #4ade80; }
  .item-check.checked::after { content:'✓'; font-size:12px; color:#0f0f13; font-weight:700; }
  .item-info { flex: 1; min-width: 0; }
  .item-name-text { font-size: 1rem; }
  .item-name-text.done { text-decoration: line-through; opacity: 0.4; }
  .item-qty-text { font-size: 0.78rem; color: var(--text2); margin-top: 1px; }
  .item-owner-dot { width: 7px; height: 7px; border-radius: 50%; flex-shrink: 0; }
  .item-del {
    background: none; border: none; color: var(--text3);
    cursor: pointer; font-size: 1.3rem; padding: 0.25rem 0.4rem;
    transition: color 0.15s; flex-shrink: 0; line-height: 1;
  }
  .item-del:active { color: #f87171; }
  .empty-list { padding: 3rem 1.5rem; text-align: center; color: var(--text3); font-size: 0.95rem; }

  /* ── ADD ITEM BAR (sticky bottom) ── */
  .add-item-bar {
    padding: 0.75rem 1.25rem calc(0.75rem + var(--safe-bottom));
    border-top: 1px solid var(--border);
    background: var(--bg);
    display: flex; gap: 0.5rem; flex-shrink: 0;
  }
  .add-item-bar input {
    background: var(--surface); border: 1px solid var(--border2);
    border-radius: var(--radius-sm); color: var(--text);
    font-family: 'DM Sans', sans-serif; font-size: 1rem;
    padding: 0.7rem 1rem; outline: none; min-width: 0;
    -webkit-appearance: none;
  }
  .add-item-bar input:focus { border-color: rgba(255,255,255,0.3); }
  .add-item-bar input::placeholder { color: var(--text3); }
  .name-inp { flex: 1; }
  .qty-inp  { width: 80px; }
  .add-btn  {
    background: var(--surface2); border: 1px solid var(--border2);
    border-radius: var(--radius-sm); color: var(--text);
    cursor: pointer; padding: 0.7rem 1rem; font-size: 1.3rem;
    flex-shrink: 0; line-height: 1;
  }
  .add-btn:active { background: rgba(255,255,255,0.15); }

  /* ── MODAL ── */
  .modal-overlay {
    position: fixed; inset: 0; z-index: 50;
    background: rgba(0,0,0,0.75);
    display: flex; align-items: flex-end; justify-content: center;
  }
  .modal-overlay.hidden { display: none; }
  .modal {
    background: var(--surface);
    border: 1px solid var(--border2);
    border-radius: 24px 24px 0 0;
    padding: 1.5rem 1.5rem calc(1.5rem + var(--safe-bottom));
    width: 100%; max-width: 500px;
    max-height: 90vh; overflow-y: auto;
  }
  .modal-handle { width: 40px; height: 4px; background: var(--border2); border-radius: 99px; margin: 0 auto 1.25rem; }
  .modal h3 { font-family: 'DM Serif Display', serif; font-size: 1.4rem; margin-bottom: 1.25rem; }
  .modal label { display: block; font-size: 0.78rem; color: var(--text2); margin-bottom: 0.35rem; margin-top: 1.1rem; text-transform: uppercase; letter-spacing: 0.06em; }
  .modal input[type=text] {
    width: 100%; background: var(--surface2); border: 1px solid var(--border2);
    border-radius: var(--radius-sm); color: var(--text);
    font-family: 'DM Sans', sans-serif; font-size: 1rem;
    padding: 0.75rem 1rem; outline: none; -webkit-appearance: none;
  }

  /* Emoji picker trigger */
  .emoji-picker-wrap { position: relative; display: inline-block; }
  .emoji-display {
    font-size: 2.5rem; cursor: pointer; line-height: 1;
    padding: 0.4rem 0.6rem;
    background: var(--surface2); border: 1px solid var(--border2);
    border-radius: var(--radius-sm); display: inline-block;
  }
  .emoji-input-hidden {
    position: absolute; top: 0; left: 0;
    width: 100%; height: 100%; opacity: 0;
    font-size: 2rem; cursor: pointer; border: none; background: transparent;
  }

  /* Gradient picker */
  .gradient-grid {
    display: grid; grid-template-columns: repeat(5, 1fr); gap: 0.5rem; margin-top: 0.4rem;
  }
  .gradient-opt {
    aspect-ratio: 1; border-radius: 10px; cursor: pointer;
    border: 2px solid transparent; transition: all 0.15s;
  }
  .gradient-opt.selected { border-color: rgba(255,255,255,0.8); transform: scale(1.08); }

  /* Photo upload */
  .photo-upload-btn {
    margin-top: 0.5rem;
    width: 100%; padding: 0.75rem;
    border-radius: var(--radius-sm);
    border: 1.5px dashed var(--border2);
    background: transparent; color: var(--text2);
    font-family: 'DM Sans', sans-serif; font-size: 0.95rem;
    cursor: pointer; display: flex; align-items: center; justify-content: center; gap: 0.5rem;
  }
  .photo-preview {
    margin-top: 0.5rem; width: 100%; height: 100px;
    object-fit: cover; border-radius: var(--radius-sm);
    border: 1px solid var(--border2); display: none;
  }
  input[type=file] { display: none; }

  .modal-actions { display: flex; gap: 0.75rem; margin-top: 1.5rem; }
  .btn-primary {
    flex: 1; padding: 0.85rem; border-radius: var(--radius-sm);
    background: rgba(255,255,255,0.1); border: 1px solid var(--border2);
    color: var(--text); font-family: 'DM Sans', sans-serif;
    font-size: 1rem; font-weight: 500; cursor: pointer;
  }
  .btn-primary:active { background: rgba(255,255,255,0.2); }
  .btn-cancel {
    padding: 0.85rem 1.1rem; border-radius: var(--radius-sm);
    background: transparent; border: 1px solid var(--border);
    color: var(--text2); font-family: 'DM Sans', sans-serif;
    font-size: 1rem; cursor: pointer;
  }
  .btn-danger {
    padding: 0.85rem 1.1rem; border-radius: var(--radius-sm);
    background: rgba(248,113,113,0.1); border: 1px solid rgba(248,113,113,0.3);
    color: #f87171; font-family: 'DM Sans', sans-serif;
    font-size: 1rem; cursor: pointer;
  }
</style>
</head>
<body>

<!-- Identity Screen -->
<div id="identityScreen">
  <div class="identity-card">
    <div class="big-emoji">🏠</div>
    <h2>Zettelwirtschaft</h2>
    <p>Wer bist du? Diese Frage wird nur einmal gestellt.</p>
    <div class="identity-btns">
      <button class="id-btn blue"   onclick="setUser('david','blue')">
        <span class="dot"></span> David
      </button>
      <button class="id-btn violet" onclick="setUser('catze','violet')">
        <span class="dot"></span> Catze
      </button>
    </div>
  </div>
</div>

<!-- Main App -->
<div id="app" style="display:none">
  <div class="app-header">
    <div class="app-title">Zettelwirtschaft</div>
    <div class="user-chip" onclick="resetUser()">
      <span class="dot" id="userDot"></span>
      <span id="userName"></span>
    </div>
  </div>
  <div class="sync-bar">
    <div class="sync-dot loading" id="syncDot"></div>
    <span id="syncText">Verbinde...</span>
  </div>
  <button class="add-list-btn" onclick="openNewListModal()">＋ Neue Liste erstellen</button>
  <div class="lists-container" id="listsContainer"></div>
</div>

<!-- Detail View -->
<div id="detailView">
  <div class="detail-header" id="detailHeader">
    <div class="detail-header-bg"></div>
    <button class="back-btn" onclick="closeDetail()">← Zurück</button>
    <div class="detail-title-wrap">
      <div class="detail-emoji" id="detailEmoji"></div>
      <div class="detail-name"  id="detailName"></div>
    </div>
    <button class="detail-edit-btn" onclick="openEditListModal(currentListId)">✎</button>
  </div>
  <div class="detail-body" id="detailBody"></div>
  <div class="add-item-bar">
    <input class="name-inp" type="text" id="itemNameInput" placeholder="Eintrag hinzufügen..." inputmode="text">
    <input class="qty-inp"  type="text" id="itemQtyInput"  placeholder="Menge" inputmode="text">
    <button class="add-btn" onclick="addItem()">＋</button>
  </div>
</div>

<!-- List Modal -->
<div class="modal-overlay hidden" id="listModal">
  <div class="modal">
    <div class="modal-handle"></div>
    <h3 id="modalTitle">Neue Liste</h3>

    <label>Name</label>
    <input type="text" id="listNameInput" placeholder="z.B. Supermarkt" maxlength="40">

    <label>Emoji</label>
    <div class="emoji-picker-wrap">
      <div class="emoji-display" id="emojiDisplay">🛒</div>
      <input class="emoji-input-hidden" type="text" id="emojiHiddenInput"
             inputmode="none" readonly
             onfocus="this.removeAttribute('readonly')"
             oninput="handleEmojiInput(this.value)">
    </div>
    <div style="font-size:0.78rem;color:var(--text3);margin-top:0.4rem;">Tippe auf das Emoji um die Tastatur zu öffnen</div>

    <label>Hintergrund</label>
    <div class="gradient-grid" id="gradientGrid"></div>

    <label>Eigenes Foto</label>
    <label class="photo-upload-btn" for="photoInput">📷 Foto auswählen</label>
    <input type="file" id="photoInput" accept="image/*" onchange="handlePhoto(this)">
    <img id="photoPreview" class="photo-preview" alt="Vorschau">

    <div class="modal-actions">
      <button class="btn-primary" onclick="saveList()">Speichern</button>
      <button class="btn-danger"  id="deleteListBtn" onclick="deleteCurrentList()" style="display:none">Löschen</button>
      <button class="btn-cancel"  onclick="closeModal()">✕</button>
    </div>
  </div>
</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
import { getDatabase, ref, onValue, push, remove, update, get } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-database.js";

// ════════════════════════════════════════════
// 🔧 FIREBASE KONFIGURATION
// ════════════════════════════════════════════
const firebaseConfig = {
  apiKey: "AIzaSyC0oBGVi_mScjg1vN-LKjc58_BgIP2-s_g",
  authDomain: "zettelwirtschaft-ca193.firebaseapp.com",
  databaseURL: "https://zettelwirtschaft-ca193-default-rtdb.europe-west1.firebasedatabase.app",
  projectId: "zettelwirtschaft-ca193",
  storageBucket: "zettelwirtschaft-ca193.firebasestorage.app",
  messagingSenderId: "223187989807",
  appId: "1:223187989807:web:c3db93ac788a4e4d135dda",
  measurementId: "G-2ZEQZ112EH"
};
// ════════════════════════════════════════════

const GRADIENTS = [
  'linear-gradient(135deg,#1a1a2e,#16213e)',
  'linear-gradient(135deg,#0d3b2e,#1a4a35)',
  'linear-gradient(135deg,#2d1b3d,#3d1f5c)',
  'linear-gradient(135deg,#2e1b1b,#4a2020)',
  'linear-gradient(135deg,#1e2a2a,#2a4040)',
  'linear-gradient(135deg,#2a2a1e,#3d3d10)',
  'linear-gradient(135deg,#1b2838,#243447)',
  'linear-gradient(135deg,#2c1810,#4a2a1a)',
  'linear-gradient(135deg,#102027,#1a3a45)',
  'linear-gradient(135deg,#27102c,#3d1845)',
  'linear-gradient(135deg,#0f2027,#203a43,#2c5364)',
  'linear-gradient(135deg,#200122,#6f0000)',
  'linear-gradient(135deg,#0f0c29,#302b63,#24243e)',
  'linear-gradient(135deg,#134e5e,#71b280)',
  'linear-gradient(135deg,#373b44,#4286f4)',
];

let db, listsRef, currentUser, currentListId = null, editingListId = null;
let selectedEmoji = '🛒', selectedGradient = GRADIENTS[0], selectedPhotoBase64 = null;
let listsData = {};

// Build gradient picker
const gradientGrid = document.getElementById('gradientGrid');
GRADIENTS.forEach((g, i) => {
  const d = document.createElement('div');
  d.className = 'gradient-opt' + (i===0?' selected':'');
  d.style.background = g;
  d.onclick = () => {
    selectedGradient = g; selectedPhotoBase64 = null;
    document.getElementById('photoPreview').style.display = 'none';
    document.querySelectorAll('.gradient-opt').forEach(x=>x.classList.remove('selected'));
    d.classList.add('selected');
  };
  gradientGrid.appendChild(d);
});

// Emoji input
window.handleEmojiInput = (val) => {
  const emojis = [...val].filter(c => /\p{Emoji}/u.test(c));
  if (emojis.length) {
    selectedEmoji = emojis[emojis.length-1];
    document.getElementById('emojiDisplay').textContent = selectedEmoji;
    document.getElementById('emojiHiddenInput').value = '';
  }
};

// Photo upload
window.handlePhoto = (input) => {
  const file = input.files[0];
  if (!file) return;
  const reader = new FileReader();
  reader.onload = e => {
    selectedPhotoBase64 = e.target.result;
    const preview = document.getElementById('photoPreview');
    preview.src = selectedPhotoBase64;
    preview.style.display = 'block';
    document.querySelectorAll('.gradient-opt').forEach(x=>x.classList.remove('selected'));
    selectedGradient = null;
  };
  reader.readAsDataURL(file);
};

// User
window.setUser = (id, color) => {
  localStorage.setItem('zw-user-id', id);
  localStorage.setItem('zw-user-color', color);
  document.getElementById('identityScreen').style.display = 'none';
  document.getElementById('app').style.display = 'block';
  initUser();
};
window.resetUser = () => {
  if (confirm('Benutzer wechseln?')) { localStorage.removeItem('zw-user-id'); location.reload(); }
};

function initUser() {
  currentUser = { id: localStorage.getItem('zw-user-id'), color: localStorage.getItem('zw-user-color') };
  document.getElementById('userDot').style.background = currentUser.color === 'blue' ? 'var(--blue)' : 'var(--violet)';
  document.getElementById('userName').textContent = currentUser.id === 'david' ? 'David' : 'Catze';
  initFirebase();
}

function initFirebase() {
  const app = initializeApp(firebaseConfig);
  db = getDatabase(app);
  listsRef = ref(db, 'lists');
  onValue(listsRef, snap => {
    listsData = snap.val() || {};
    document.getElementById('syncDot').className = 'sync-dot';
    document.getElementById('syncText').textContent = 'Live synchronisiert';
    renderLists();
    if (currentListId) renderDetail(currentListId);
  }, () => {
    document.getElementById('syncDot').className = 'sync-dot error';
    document.getElementById('syncText').textContent = 'Verbindungsfehler';
  });
}

function bgStyle(list) {
  if (list.photo)    return `background-image:url('${list.photo}')`;
  if (list.gradient) return `background:${list.gradient}`;
  return `background:${GRADIENTS[0]}`;
}

function renderLists() {
  const container = document.getElementById('listsContainer');
  container.innerHTML = '';
  Object.entries(listsData).forEach(([listId, list]) => {
    const items = list.items || {};
    const total = Object.keys(items).length;
    const done  = Object.values(items).filter(i=>i.done).length;
    const tile  = document.createElement('div');
    tile.className = 'list-tile';
    tile.setAttribute('style', bgStyle(list));
    tile.innerHTML = `
      <div class="list-tile-inner">
        <div class="list-tile-left">
          <div class="list-tile-emoji">${list.emoji||'📋'}</div>
          <div class="list-tile-name">${list.name}</div>
          <div class="list-tile-count">${done}/${total}</div>
        </div>
        <button class="list-tile-edit" onclick="event.stopPropagation();openEditListModal('${listId}')">✎</button>
      </div>`;
    tile.addEventListener('click', () => openDetail(listId));
    container.appendChild(tile);
  });
}

// Detail view
window.openDetail = (listId) => {
  currentListId = listId;
  renderDetail(listId);
  document.getElementById('detailView').classList.add('open');
  document.getElementById('itemNameInput').focus();
};
window.closeDetail = () => {
  document.getElementById('detailView').classList.remove('open');
  currentListId = null;
};

function renderDetail(listId) {
  const list  = listsData[listId]; if (!list) return;
  const items = list.items || {};
  const header = document.getElementById('detailHeader');
  header.setAttribute('style', bgStyle(list) + '; background-size:cover; background-position:center;');
  document.getElementById('detailEmoji').textContent = list.emoji || '📋';
  document.getElementById('detailName').textContent  = list.name;

  const body = document.getElementById('detailBody');
  const sorted = Object.entries(items).sort(([,a],[,b]) => (a.done-b.done)||(a.ts-b.ts));
  if (!sorted.length) {
    body.innerHTML = '<div class="empty-list">Noch keine Einträge 🙂</div>';
    return;
  }
  body.innerHTML = sorted.map(([itemId, item]) => {
    const ownerColor = item.owner === 'david' ? 'var(--blue)' : 'var(--violet)';
    return `<div class="item-row">
      <div class="item-check ${item.done?'checked':''}" onclick="toggleItem('${listId}','${itemId}',${!item.done})"></div>
      <div class="item-info">
        <div class="item-name-text ${item.done?'done':''}">${item.name}</div>
        ${item.qty ? `<div class="item-qty-text">× ${item.qty}</div>` : ''}
      </div>
      <div class="item-owner-dot" style="background:${ownerColor}" title="${item.owner==='david'?'David':'Catze'}"></div>
      <button class="item-del" onclick="deleteItem('${listId}','${itemId}')">×</button>
    </div>`;
  }).join('');
}

window.addItem = async () => {
  const nameEl = document.getElementById('itemNameInput');
  const qtyEl  = document.getElementById('itemQtyInput');
  const name   = nameEl.value.trim();
  if (!name || !currentListId) return;
  await push(ref(db, `lists/${currentListId}/items`), {
    name, qty: qtyEl.value.trim(), done: false, owner: currentUser.id, ts: Date.now()
  });
  nameEl.value = ''; qtyEl.value = '';
  nameEl.focus();
};
document.getElementById('itemNameInput').addEventListener('keydown', e => { if(e.key==='Enter') window.addItem(); });
document.getElementById('itemQtyInput').addEventListener('keydown',  e => { if(e.key==='Enter') window.addItem(); });

window.toggleItem = async (listId, itemId, done) => {
  await update(ref(db, `lists/${listId}/items/${itemId}`), {done});
};
window.deleteItem = async (listId, itemId) => {
  await remove(ref(db, `lists/${listId}/items/${itemId}`));
};

// List modal
window.openNewListModal = () => {
  editingListId = null;
  document.getElementById('modalTitle').textContent = 'Neue Liste';
  document.getElementById('listNameInput').value = '';
  document.getElementById('deleteListBtn').style.display = 'none';
  document.getElementById('photoPreview').style.display = 'none';
  document.getElementById('photoInput').value = '';
  selectedEmoji = '🛒'; selectedGradient = GRADIENTS[0]; selectedPhotoBase64 = null;
  document.getElementById('emojiDisplay').textContent = selectedEmoji;
  document.querySelectorAll('.gradient-opt').forEach((x,i)=>x.classList.toggle('selected',i===0));
  document.getElementById('listModal').classList.remove('hidden');
};

window.openEditListModal = async (listId) => {
  editingListId = listId;
  const list = listsData[listId] || {};
  document.getElementById('modalTitle').textContent = 'Liste bearbeiten';
  document.getElementById('deleteListBtn').style.display = 'block';
  document.getElementById('listNameInput').value = list.name || '';
  selectedEmoji = list.emoji || '🛒';
  document.getElementById('emojiDisplay').textContent = selectedEmoji;
  selectedGradient = list.gradient || null;
  selectedPhotoBase64 = list.photo || null;
  const preview = document.getElementById('photoPreview');
  if (list.photo) { preview.src = list.photo; preview.style.display = 'block'; }
  else            { preview.style.display = 'none'; }
  document.querySelectorAll('.gradient-opt').forEach(x => x.classList.toggle('selected', x.style.background === selectedGradient));
  document.getElementById('listModal').classList.remove('hidden');
};

window.saveList = async () => {
  const name = document.getElementById('listNameInput').value.trim();
  if (!name) return;
  const data = { name, emoji: selectedEmoji, gradient: selectedGradient || null, photo: selectedPhotoBase64 || null };
  if (editingListId) {
    await update(ref(db, `lists/${editingListId}`), data);
  } else {
    await push(listsRef, { ...data, items: {} });
  }
  closeModal();
};

window.deleteCurrentList = async () => {
  if (!editingListId) return;
  if (confirm('Liste wirklich löschen?')) {
    await remove(ref(db, `lists/${editingListId}`));
    closeModal();
    if (currentListId === editingListId) closeDetail();
  }
};
window.closeModal = () => {
  document.getElementById('listModal').classList.add('hidden');
  editingListId = null;
};

// Init
const savedUser = localStorage.getItem('zw-user-id');
if (savedUser) {
  document.getElementById('identityScreen').style.display = 'none';
  document.getElementById('app').style.display = 'block';
  initUser();
}
</script>
</body>
</html>
